openapi: 3.0.3
info:
  title: Chatos Memory Backend API
  version: 0.1.0-bootstrap
  description: 'Bootstrap OpenAPI contract for memory_server/backend.

    This is an initial skeleton and will be expanded incrementally.

    '
servers:
- url: http://localhost:7080
