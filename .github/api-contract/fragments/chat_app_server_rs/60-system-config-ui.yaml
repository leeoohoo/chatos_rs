paths:
  /api/system-contexts:
    get:
      summary: List system contexts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: getApiSystemContexts
    post:
      summary: Create system context
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: postApiSystemContexts
  /api/system-contexts/{context_id}:
    get:
      summary: Get system context
      parameters:
      - in: path
        name: context_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: getApiSystemContextsByContextId
    patch:
      summary: Update system context
      parameters:
      - in: path
        name: context_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: patchApiSystemContextsByContextId
    delete:
      summary: Delete system context
      parameters:
      - in: path
        name: context_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: deleteApiSystemContextsByContextId
  /api/system-context/active:
    get:
