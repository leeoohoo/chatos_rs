services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: ${BACKEND_DOCKER_TARGET:-runtime}
      args:
        BACKEND_EXTRA_APT_PACKAGES: ${BACKEND_EXTRA_APT_PACKAGES:-}
    image: chatos/backend:latest
    container_name: chatos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      # Container-internal backend port; keep this aligned with nginx upstream.
      BACKEND_PORT: 3997
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      NOTEPAD_DATA_DIR: ${NOTEPAD_DATA_DIR:-/app/data/notepad}
    volumes:
      - ./chat_app_server_rs/config:/app/config:ro
      # Use named volumes to isolate Docker runtime data from local dev environment.
      - chatos_backend_data:/app/data
      - chatos_backend_logs:/app/logs
      # Optional: map a host folder into container for file browsing/editing features.
      # Example: HOST_MOUNT_DIR=/Users/lilei/workspace
      - ${HOST_MOUNT_DIR:-.}:/workspace:rw
    ports:
      - "3997:3997"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: chatos/frontend:latest
    container_name: chatos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  chatos_backend_data:
  chatos_backend_logs:
