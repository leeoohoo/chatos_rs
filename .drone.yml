---
kind: pipeline
type: docker
name: api-contract

clone:
  git:
    image: drone/git:local
    pull: if-not-exists

steps:
  - name: api-contract
    image: python:3.12-bookworm
    commands:
      - find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i -e 's|http://deb.debian.org/debian|http://mirrors.cloud.aliyuncs.com/debian|g' -e 's|http://deb.debian.org/debian-security|http://mirrors.cloud.aliyuncs.com/debian-security|g' {} + && apt-get update && apt-get install -y --no-install-recommends git bash ca-certificates && rm -rf /var/lib/apt/lists/*
      - python3 -m pip install --no-cache-dir PyYAML
      - bash scripts/check_api_surface.sh
      - bash scripts/check_api_path_baseline.sh
      - bash scripts/check_openapi_contract_assembly.sh
      - bash scripts/check-large-files.sh --fail
      - bash scripts/check_openapi_contract_gate.sh
      - bash scripts/check_openapi_method_contract_gate.sh
      - bash scripts/check_openapi_contract_quality_gate.sh
      - bash scripts/check_openapi_contract_semantic_gate.sh

---
kind: pipeline
type: docker
name: backend-chatos

clone:
  git:
    image: drone/git:local
    pull: if-not-exists

steps:
  - name: cargo-check
    image: rust:1-bookworm
    commands:
      - find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i -e 's|http://deb.debian.org/debian|http://mirrors.cloud.aliyuncs.com/debian|g' -e 's|http://deb.debian.org/debian-security|http://mirrors.cloud.aliyuncs.com/debian-security|g' {} + && apt-get update && apt-get install -y --no-install-recommends git bash python3 build-essential clang cmake libssl-dev pkg-config protobuf-compiler ca-certificates && rm -rf /var/lib/apt/lists/*
      - cargo check --manifest-path Cargo.toml -p chat_app_server_rs
      - cargo clippy --workspace --all-targets -- -D warnings
      - bash scripts/check-request-path-panics.sh
      - python3 scripts/check-non-test-unwrap-expect.py
      - bash scripts/check-hotspot-line-budgets.sh

