name: chatos-rs

x-rust-service: &rust-service
  restart: unless-stopped
  depends_on:
    consul:
      condition: service_healthy
    mongodb:
      condition: service_healthy
  networks:
    - cloud

x-service-runtime-env: &service-runtime-env
  CHATOS_SERVICE_RUNTIME_ENABLED: ${CHATOS_SERVICE_RUNTIME_ENABLED:-true}
  CHATOS_SERVICE_DISCOVERY_MODE: ${CHATOS_SERVICE_DISCOVERY_MODE:-consul,static}
  CHATOS_ENV: ${CHATOS_ENV:-local}
  CHATOS_CONSUL_HTTP_ADDR: ${CHATOS_CONSUL_HTTP_ADDR:-http://consul:8500}
  CHATOS_SERVICE_RUNTIME_REQUEST_TIMEOUT_MS: ${CHATOS_SERVICE_RUNTIME_REQUEST_TIMEOUT_MS:-3000}

x-frontend-service: &frontend-service
  restart: unless-stopped
  networks:
    - cloud

services:
  consul:
    image: ${CONSUL_IMAGE:-hashicorp/consul:1.21}
    restart: unless-stopped
    command: ["agent", "-dev", "-client=0.0.0.0", "-ui", "-data-dir=/tmp/consul-data"]
    ports:
      - "${CHATOS_INFRA_BIND_HOST:-127.0.0.1}:${CONSUL_HTTP_PORT:-8500}:8500"
    volumes:
      - ./consul/services/harness.json:/consul/config/harness.json:ro
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - cloud

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-admin}
    ports:
      - "${CHATOS_INFRA_BIND_HOST:-127.0.0.1}:${MONGODB_HOST_PORT:-27018}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - cloud

  sandbox-agent-image:
    image: ${SANDBOX_MANAGER_DOCKER_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-sandbox-agent:${CHATOS_IMAGE_TAG:-latest}}
    profiles:
      - image
    networks:
      - cloud

  harness:
    image: ${HARNESS_IMAGE:-harness/harness:latest}
    restart: unless-stopped
    environment:
      GITNESS_HTTP_HOST: 0.0.0.0
      GITNESS_HTTP_PORT: 3000
      GITNESS_HTTP_PROTO: http
      GITNESS_URL_BASE: "${HARNESS_PUBLIC_BASE_URL:-http://localhost:3000}"
      GITNESS_URL_API: "${HARNESS_PUBLIC_BASE_URL:-http://localhost:3000}/api"
      GITNESS_URL_UI: "${HARNESS_PUBLIC_BASE_URL:-http://localhost:3000}"
      GITNESS_URL_INTERNAL: "http://harness:3000"
      GITNESS_URL_CONTAINER: "http://harness:3000"
      GITNESS_URL_GIT: "${HARNESS_GIT_BASE_URL:-http://localhost:3000/git}"
      GITNESS_URL_GIT_SSH: "ssh://git@${HARNESS_SSH_PUBLIC_HOST:-${HARNESS_SSH_HOST:-localhost}}:${HARNESS_SSH_PORT:-3022}"
      GITNESS_PRINCIPAL_ADMIN_EMAIL: ${HARNESS_ADMIN_EMAIL:-admin@chatos.local}
      GITNESS_PRINCIPAL_ADMIN_PASSWORD: ${HARNESS_ADMIN_PASSWORD:-admin123456}
      GITNESS_METRIC_ENABLED: "false"
      GITNESS_WEBHOOK_ALLOW_LOOPBACK: "true"
      GITNESS_SSH_ENABLE: "true"
      GITNESS_SSH_HOST: ${HARNESS_SSH_LISTEN_HOST:-0.0.0.0}
      GITNESS_SSH_PORT: 3022
      GITNESS_GITSPACE_ENABLE: "${HARNESS_GITSPACE_ENABLE:-true}"
      ENABLE_CI: "${HARNESS_CI_ENABLED:-true}"
      GITNESS_CI_PARALLEL_WORKERS: ${HARNESS_CI_PARALLEL_WORKERS:-2}
      GITNESS_CI_CONTAINER_NETWORKS: ${HARNESS_CI_CONTAINER_NETWORKS:-${CHATOS_DOCKER_NETWORK:-chatos-cloud}}
      GITNESS_DOCKER_HOST: "unix:///var/run/docker.sock"
      GITNESS_DATABASE_DRIVER: sqlite3
      GITNESS_DATABASE_DATASOURCE: /data/database.sqlite
      GITNESS_GIT_ROOT: /data
      GITNESS_REGISTRY_STORAGE_TYPE: filesystem
      GITNESS_REGISTRY_FILESYSTEM_ROOT_DIRECTORY: /data/registry
      XDG_CACHE_HOME: /data
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${HARNESS_PORT:-3000}:3000"
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${HARNESS_SSH_PORT:-3022}:3022"
    volumes:
      - harness-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/api/v1/system/health || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 60
    networks:
      - cloud

  user-service-backend:
    <<: *rust-service
    image: ${USER_SERVICE_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-user-service-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: user-service
      CHATOS_SERVICE_ID: user-service-docker
      CHATOS_SERVICE_ADDRESS: user-service-backend
      CHATOS_SERVICE_PORT: 39190
      CHATOS_SERVICE_HEALTH_PATH: /api/health
      USER_SERVICE_HOST: 0.0.0.0
      USER_SERVICE_PORT: 39190
      USER_SERVICE_DATABASE_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/user_service?authSource=admin
      USER_SERVICE_MONGODB_DATABASE: user_service
      USER_SERVICE_JWT_SECRET: ${USER_SERVICE_JWT_SECRET:-change_me_user_service_secret}
      USER_SERVICE_JWT_ISSUER: ${USER_SERVICE_JWT_ISSUER:-user_service}
      USER_SERVICE_USER_AUDIENCE: ${USER_SERVICE_USER_AUDIENCE:-user_service}
      USER_SERVICE_TASK_RUNNER_AUDIENCE: ${USER_SERVICE_TASK_RUNNER_AUDIENCE:-task_runner}
      PROJECT_SERVICE_USER_SERVICE_INTERNAL_API_SECRET: ${PROJECT_SERVICE_USER_SERVICE_INTERNAL_API_SECRET:-change_me_project_service_user_service_secret}
      USER_SERVICE_SMTP_HOST: ${USER_SERVICE_SMTP_HOST:-}
      USER_SERVICE_SMTP_PORT: ${USER_SERVICE_SMTP_PORT:-587}
      USER_SERVICE_SMTP_USERNAME: ${USER_SERVICE_SMTP_USERNAME:-}
      USER_SERVICE_SMTP_PASSWORD: ${USER_SERVICE_SMTP_PASSWORD:-}
      USER_SERVICE_EMAIL_FROM: ${USER_SERVICE_EMAIL_FROM:-}
      USER_SERVICE_EMAIL_FROM_NAME: ${USER_SERVICE_EMAIL_FROM_NAME:-Chat OS}
      USER_SERVICE_REGISTER_CODE_TTL_SECONDS: ${USER_SERVICE_REGISTER_CODE_TTL_SECONDS:-600}
      USER_SERVICE_REGISTER_CODE_RESEND_SECONDS: ${USER_SERVICE_REGISTER_CODE_RESEND_SECONDS:-60}
      USER_SERVICE_REGISTER_CODE_HOURLY_LIMIT: ${USER_SERVICE_REGISTER_CODE_HOURLY_LIMIT:-5}
      USER_SERVICE_REGISTER_CODE_MAX_ATTEMPTS: ${USER_SERVICE_REGISTER_CODE_MAX_ATTEMPTS:-5}
      USER_SERVICE_LOGIN_MAX_FAILED_ATTEMPTS: ${USER_SERVICE_LOGIN_MAX_FAILED_ATTEMPTS:-5}
      USER_SERVICE_LOGIN_FAILURE_WINDOW_SECONDS: ${USER_SERVICE_LOGIN_FAILURE_WINDOW_SECONDS:-300}
      USER_SERVICE_LOGIN_LOCKOUT_SECONDS: ${USER_SERVICE_LOGIN_LOCKOUT_SECONDS:-300}
      USER_SERVICE_SUPER_ADMIN_USERNAME: ${CHATOS_ADMIN_USERNAME:-admin}
      USER_SERVICE_SUPER_ADMIN_PASSWORD: ${CHATOS_ADMIN_PASSWORD:-admin123456}
      USER_SERVICE_SUPER_ADMIN_DISPLAY_NAME: ${CHATOS_ADMIN_DISPLAY_NAME:-System Admin}
      MEMORY_ENGINE_BASE_URL: http://memory-engine-backend:7081/api/memory-engine/v1
      USER_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET: ${USER_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_user_service_memory_engine_secret}
      TASK_RUNNER_BASE_URL: http://task-runner-backend:39090
      TASK_RUNNER_CHATOS_CALLBACK_SECRET: ${TASK_RUNNER_CHATOS_CALLBACK_SECRET:-change_me_chatos_task_runner_secret}
      HARNESS_PROVISIONING_ENABLED: ${HARNESS_PROVISIONING_ENABLED:-true}
      HARNESS_BASE_URL: ${HARNESS_BASE_URL:-http://harness:3000}
      HARNESS_SYNTHETIC_EMAIL_DOMAIN: ${HARNESS_SYNTHETIC_EMAIL_DOMAIN:-chatos.local}
      HARNESS_SPACE_PREFIX: ${HARNESS_SPACE_PREFIX:-u-}
      HARNESS_PROJECT_PAT_PREFIX: ${HARNESS_PROJECT_PAT_PREFIX:-chatos-project}
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${USER_SERVICE_PORT:-39190}:39190"
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      harness:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:39190/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  memory-engine-backend:
    <<: *rust-service
    image: ${MEMORY_ENGINE_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-memory-engine-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: memory-engine
      CHATOS_SERVICE_ID: memory-engine-docker
      CHATOS_SERVICE_ADDRESS: memory-engine-backend
      CHATOS_SERVICE_PORT: 7081
      CHATOS_SERVICE_HEALTH_PATH: /health
      MEMORY_ENGINE_HOST: 0.0.0.0
      MEMORY_ENGINE_PORT: 7081
      MEMORY_ENGINE_MONGODB_URI: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/admin
      MEMORY_ENGINE_MONGODB_DATABASE: memory_engine
      CHATOS_MEMORY_ENGINE_INTERNAL_API_SECRET: ${CHATOS_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_chatos_memory_engine_secret}
      TASK_RUNNER_MEMORY_ENGINE_INTERNAL_API_SECRET: ${TASK_RUNNER_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_task_runner_memory_engine_secret}
      PROJECT_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET: ${PROJECT_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_project_service_memory_engine_secret}
      USER_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET: ${USER_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_user_service_memory_engine_secret}
      LOCAL_CONNECTOR_MEMORY_ENGINE_INTERNAL_API_SECRET: ${LOCAL_CONNECTOR_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_local_connector_memory_engine_secret}
      MEMORY_ENGINE_OPERATOR_TOKEN: ${MEMORY_ENGINE_OPERATOR_TOKEN:-}
      MEMORY_ENGINE_USER_SERVICE_BASE_URL: http://user-service-backend:39190
      MEMORY_ENGINE_LOCAL_CONNECTOR_SERVICE_BASE_URL: http://local-connector-service-backend:39230
      MEMORY_ENGINE_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${MEMORY_ENGINE_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_memory_engine_local_connector_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${MEMORY_ENGINE_PORT:-7081}:7081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7081/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  project-management-backend:
    <<: *rust-service
    image: ${PROJECT_MANAGEMENT_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-project-management-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: project-service
      CHATOS_SERVICE_ID: project-service-docker
      CHATOS_SERVICE_ADDRESS: project-management-backend
      CHATOS_SERVICE_PORT: 39210
      CHATOS_SERVICE_HEALTH_PATH: /api/health
      PROJECT_SERVICE_HOST: 0.0.0.0
      PROJECT_SERVICE_PORT: 39210
      PROJECT_SERVICE_DATABASE_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/project_management_service?authSource=admin
      PROJECT_SERVICE_USER_SERVICE_BASE_URL: http://user-service-backend:39190
      PROJECT_SERVICE_TASK_RUNNER_BASE_URL: http://task-runner-backend:39090
      PROJECT_SERVICE_LOCAL_CONNECTOR_SERVICE_BASE_URL: http://local-connector-service-backend:39230
      PLUGIN_MANAGEMENT_SERVICE_URL: http://plugin-management-backend:39260
      PLUGIN_MANAGEMENT_PROJECT_SERVICE_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_PROJECT_SERVICE_INTERNAL_API_SECRET:-${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}}
      PROJECT_SERVICE_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${PROJECT_SERVICE_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_project_service_local_connector_secret}
      PROJECT_SERVICE_MEMORY_ENGINE_BASE_URL: http://memory-engine-backend:7081/api/memory-engine/v1
      PROJECT_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET: ${PROJECT_SERVICE_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_project_service_memory_engine_secret}
      PROJECT_SERVICE_SANDBOX_MANAGER_BASE_URL: http://sandbox-manager-backend:8095
      PROJECT_SERVICE_SANDBOX_MANAGER_CLIENT_ID: project-service
      PROJECT_SERVICE_SANDBOX_MANAGER_INTERNAL_API_SECRET: ${PROJECT_SERVICE_SANDBOX_MANAGER_INTERNAL_API_SECRET:-change_me_project_service_sandbox_manager_secret}
      PROJECT_SERVICE_SYNC_SECRET: ${CHATOS_PROJECT_SERVICE_SYNC_SECRET:-}
      CHATOS_PROJECT_SERVICE_INTERNAL_API_SECRET: ${CHATOS_PROJECT_SERVICE_INTERNAL_API_SECRET:-change_me_chatos_project_service_secret}
      TASK_RUNNER_PROJECT_SERVICE_INTERNAL_API_SECRET: ${TASK_RUNNER_PROJECT_SERVICE_INTERNAL_API_SECRET:-change_me_task_runner_project_service_secret}
      PROJECT_SERVICE_SELF_INTERNAL_API_SECRET: ${PROJECT_SERVICE_SELF_INTERNAL_API_SECRET:-change_me_project_service_self_secret}
      PROJECT_SERVICE_USER_SERVICE_INTERNAL_SECRET: ${PROJECT_SERVICE_USER_SERVICE_INTERNAL_API_SECRET:-change_me_project_service_user_service_secret}
      PROJECT_SERVICE_TASK_RUNNER_INTERNAL_SECRET: ${PROJECT_SERVICE_TASK_RUNNER_INTERNAL_API_SECRET:-change_me_project_service_task_runner_secret}
    depends_on:
      plugin-management-backend:
        condition: service_healthy
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${PROJECT_SERVICE_PORT:-39210}:39210"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:39210/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  plugin-management-backend:
    <<: *rust-service
    image: ${PLUGIN_MANAGEMENT_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-plugin-management-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: plugin-management-service
      CHATOS_SERVICE_ID: plugin-management-service-docker
      CHATOS_SERVICE_ADDRESS: plugin-management-backend
      CHATOS_SERVICE_PORT: 39260
      CHATOS_SERVICE_HEALTH_PATH: /api/health
      PLUGIN_MANAGEMENT_SERVICE_HOST: 0.0.0.0
      PLUGIN_MANAGEMENT_SERVICE_PORT: 39260
      PLUGIN_MANAGEMENT_SERVICE_DATABASE_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/plugin_management_service?authSource=admin
      PLUGIN_MANAGEMENT_SERVICE_MONGODB_DATABASE: plugin_management_service
      PLUGIN_MANAGEMENT_SERVICE_USER_SERVICE_BASE_URL: http://user-service-backend:39190
      PLUGIN_MANAGEMENT_CORS_ORIGINS: ${PLUGIN_MANAGEMENT_CORS_ORIGINS:-http://127.0.0.1:39261,http://localhost:39261}
      PLUGIN_MANAGEMENT_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}
      PLUGIN_MANAGEMENT_TASK_RUNNER_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_TASK_RUNNER_INTERNAL_API_SECRET:-${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}}
      PLUGIN_MANAGEMENT_PROJECT_SERVICE_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_PROJECT_SERVICE_INTERNAL_API_SECRET:-${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}}
      PLUGIN_MANAGEMENT_LOCAL_CONNECTOR_SERVICE_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_LOCAL_CONNECTOR_SERVICE_INTERNAL_API_SECRET:-${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}}
      PLUGIN_MANAGEMENT_SERVICE_SUPER_ADMIN_USERNAME: ${CHATOS_ADMIN_USERNAME:-admin}
      PLUGIN_MANAGEMENT_SERVICE_SUPER_ADMIN_PASSWORD: ${CHATOS_ADMIN_PASSWORD:-admin123456}
      PLUGIN_MANAGEMENT_SERVICE_SEED_SYSTEM_RESOURCES: ${PLUGIN_MANAGEMENT_SERVICE_SEED_SYSTEM_RESOURCES:-true}
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${PLUGIN_MANAGEMENT_SERVICE_PORT:-39260}:39260"
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      user-service-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:39260/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  local-connector-service-backend:
    <<: *rust-service
    image: ${LOCAL_CONNECTOR_SERVICE_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-local-connector-service-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: local-connector-service
      CHATOS_SERVICE_ID: local-connector-service-docker
      CHATOS_SERVICE_ADDRESS: local-connector-service-backend
      CHATOS_SERVICE_PORT: 39230
      CHATOS_SERVICE_HEALTH_PATH: /api/health
      LOCAL_CONNECTOR_SERVICE_HOST: 0.0.0.0
      LOCAL_CONNECTOR_SERVICE_PORT: 39230
      LOCAL_CONNECTOR_DATABASE_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/local_connector_service?authSource=admin
      LOCAL_CONNECTOR_USER_SERVICE_BASE_URL: http://user-service-backend:39190
      LOCAL_CONNECTOR_PUBLIC_BASE_URL: ${LOCAL_CONNECTOR_PUBLIC_BASE_URL:-http://localhost:39230}
      CHATOS_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${CHATOS_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_chatos_local_connector_secret}
      TASK_RUNNER_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${TASK_RUNNER_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_task_runner_local_connector_secret}
      PROJECT_SERVICE_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${PROJECT_SERVICE_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_project_service_local_connector_secret}
      MEMORY_ENGINE_LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${MEMORY_ENGINE_LOCAL_CONNECTOR_INTERNAL_API_SECRET:-change_me_memory_engine_local_connector_secret}
      LOCAL_CONNECTOR_INTERNAL_API_SECRET: ${LOCAL_CONNECTOR_INTERNAL_API_SECRET:-}
      PLUGIN_MANAGEMENT_SERVICE_URL: http://plugin-management-backend:39260
      PLUGIN_MANAGEMENT_LOCAL_CONNECTOR_SERVICE_INTERNAL_API_SECRET: ${PLUGIN_MANAGEMENT_LOCAL_CONNECTOR_SERVICE_INTERNAL_API_SECRET:-${PLUGIN_MANAGEMENT_INTERNAL_API_SECRET:-change_me_plugin_management_internal_secret}}
      LOCAL_CONNECTOR_MEMORY_ENGINE_BASE_URL: http://memory-engine-backend:7081/api/memory-engine/v1
      LOCAL_CONNECTOR_MEMORY_ENGINE_INTERNAL_API_SECRET: ${LOCAL_CONNECTOR_MEMORY_ENGINE_INTERNAL_API_SECRET:-change_me_local_connector_memory_engine_secret}
    ports:
      - "${CHATOS_PUBLIC_BIND_HOST:-127.0.0.1}:${LOCAL_CONNECTOR_SERVICE_PORT:-39230}:39230"
    volumes:
      - local-connector-data:/data/local_connector
    depends_on:
      plugin-management-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:39230/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  sandbox-docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-ghcr.io/tecnativa/docker-socket-proxy:latest}
    restart: unless-stopped
    networks:
      - cloud
    environment:
      CONTAINERS: "1"
      IMAGES: "1"
      BUILD: "1"
      NETWORKS: "1"
      INFO: "1"
      PING: "1"
      VERSION: "1"
      POST: "1"
      DELETE: "1"
      SERVICES: "0"
      TASKS: "0"
      SWARM: "0"
      SECRETS: "0"
      CONFIGS: "0"
      PLUGINS: "0"
      NODES: "0"
      VOLUMES: "0"
      AUTH: "0"
      DISTRIBUTION: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  sandbox-manager-backend:
    <<: *rust-service
    image: ${SANDBOX_MANAGER_BACKEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-sandbox-manager-backend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      <<: *service-runtime-env
      CHATOS_SERVICE_NAME: sandbox-manager
      CHATOS_SERVICE_ID: sandbox-manager-docker
      CHATOS_SERVICE_ADDRESS: sandbox-manager-backend
      CHATOS_SERVICE_PORT: 8095
      CHATOS_SERVICE_HEALTH_PATH: /health
      SANDBOX_MANAGER_HOST: 0.0.0.0
      SANDBOX_MANAGER_PORT: 8095
      SANDBOX_MANAGER_DATABASE_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongodb:27017/sandbox_manager_service?authSource=admin
      SANDBOX_MANAGER_MONGODB_DATABASE: sandbox_manager_service
      SANDBOX_MANAGER_BACKEND: docker
      SANDBOX_MANAGER_WORK_ROOT: /data/sandboxes
      SANDBOX_MANAGER_DOCKER_IMAGE: ${SANDBOX_MANAGER_DOCKER_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-sandbox-agent:${CHATOS_IMAGE_TAG:-latest}}
      SANDBOX_MANAGER_DOCKER_NETWORK: ${CHATOS_DOCKER_NETWORK:-chatos-cloud}
      SANDBOX_MANAGER_DOCKER_AGENT_ENDPOINT_MODE: container
      SANDBOX_MANAGER_DOCKER_PUBLISH_AGENT: "false"
      SANDBOX_MANAGER_REQUIRE_AUTH: ${SANDBOX_MANAGER_REQUIRE_AUTH:-true}
