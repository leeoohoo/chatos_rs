map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name
        jgoool.com
        www.jgoool.com
        app.jgoool.com
        user.jgoool.com
        memory.jgoool.com
        project.jgoool.com
        plugin.jgoool.com
        task.jgoool.com
        sandbox.jgoool.com
        official.jgoool.com
        connector.jgoool.com
        local-connector.jgoool.com
        harness.jgoool.com
        ci.jgoool.com;
    client_max_body_size 128m;

    include snippets/chatos-letsencrypt.conf;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name jgoool.com www.jgoool.com;
    client_max_body_size 128m;
    include snippets/chatos-ssl.conf;

    location / {
        include snippets/chatos-proxy-headers.conf;
        proxy_pass http://127.0.0.1:39251;
    }
}

