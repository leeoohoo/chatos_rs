    image: ${SANDBOX_MANAGER_FRONTEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-sandbox-manager-frontend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      API_PROXY_PASS: http://sandbox-manager-backend:8095
      SANDBOX_MANAGER_API_PROXY_CLIENT_ID: ${TASK_RUNNER_SANDBOX_MANAGER_CLIENT_ID:-task_runner}
      SANDBOX_MANAGER_API_PROXY_CLIENT_KEY: ${TASK_RUNNER_SANDBOX_MANAGER_CLIENT_KEY:-chatos-task-runner-sandbox-dev-key}
      SANDBOX_MANAGER_API_PROXY_OPERATOR_TOKEN: ${SANDBOX_MANAGER_OPERATOR_TOKEN:-chatos-sandbox-manager-dev-operator-token}
    ports:
      - "${SANDBOX_MANAGER_FRONTEND_PORT:-8096}:80"
    depends_on:
