    image: ${DB_CONNECTION_HUB_FRONTEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-db-connection-hub-frontend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
