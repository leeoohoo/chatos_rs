paths:
  /api/memory/v1/configs/models:
    get:
      summary: List memory model configs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: getApiMemoryV1ConfigsModels
    post:
      summary: Create memory model config
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: postApiMemoryV1ConfigsModels
  /api/memory/v1/configs/models/{model_id}:
    patch:
      summary: Update memory model config
      parameters:
      - in: path
        name: model_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      operationId: patchApiMemoryV1ConfigsModelsByModelId
