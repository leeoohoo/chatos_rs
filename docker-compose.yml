services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: ${BACKEND_DOCKER_TARGET:-runtime}
      args:
        BACKEND_EXTRA_APT_PACKAGES: ${BACKEND_EXTRA_APT_PACKAGES:-}
    image: agent_orchestrator/backend:latest
    container_name: agent-orchestrator-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      # Container-internal backend port; keep this aligned with nginx upstream.
      PORT: 3001
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      NOTEPAD_DATA_DIR: ${NOTEPAD_DATA_DIR:-/app/data/notepad}
    volumes:
      - ./agent_orchestrator/config:/app/config:ro
      # Use named volumes to isolate Docker runtime data from local dev environment.
      - agent_orchestrator_backend_data:/app/data
      - agent_orchestrator_backend_logs:/app/logs
      # Optional: map a host folder into container for file browsing/editing features.
      # Example: HOST_MOUNT_DIR=/Users/lilei/workspace
      - ${HOST_MOUNT_DIR:-.}:/workspace:rw
    ports:
      # Host port is configurable to avoid conflicts with local dev backend.
      - "${BACKEND_HOST_PORT:-3001}:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: agent_workspace/frontend:latest
    container_name: agent-workspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  agent_orchestrator_backend_data:
  agent_orchestrator_backend_logs:
