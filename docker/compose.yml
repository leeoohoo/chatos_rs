    environment:
      API_PROXY_PASS: http://task-runner-backend:39090
    ports:
      - "${TASK_RUNNER_FRONTEND_PORT:-39091}:80"
    depends_on:
      task-runner-backend:
        condition: service_healthy

  sandbox-manager-frontend:
