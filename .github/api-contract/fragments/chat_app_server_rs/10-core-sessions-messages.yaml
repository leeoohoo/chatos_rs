                $ref: '#/components/schemas/StandardResponse'
      operationId: postApiSessionsBySessionIdMcpServers
  /api/sessions/{session_id}/mcp-servers/{mcp_config_id}:
    delete:
      summary: Detach MCP server from session
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          type: string
      - in: path
        name: mcp_config_id
        required: true
        schema:
          type: string
      responses:
