  git:
    image: drone/git:local
    pull: if-not-exists

steps:
  - name: dockerfile-check
    image: docker:27-cli
    commands:
      - apk add --no-cache bash
      - test -f sandbox_manager_service/sandbox_agent/Dockerfile
      - test -f sandbox_manager_service/sandbox_agent/Cargo.workspace.toml
      - test -f sandbox_manager_service/sandbox_mcp_server/Cargo.toml

---
kind: pipeline
type: docker
name: docker-stack

clone:
  git:
    image: drone/git:local
    pull: if-not-exists

steps:
  - name: compose-config
    image: docker:27-cli
    commands:
      - apk add --no-cache bash docker-cli-compose
      - bash -n docker/deploy.sh
      - bash -n scripts/local-dev-stack.sh
      - bash -n docker/entrypoint-rust-service.sh
      - docker compose -f docker/compose.yml config >/dev/null
      - docker compose -f docker/compose.yml -f docker/compose.build.yml config >/dev/null

---
kind: pipeline
type: docker
name: docker-images

clone:
  git:
    image: drone/git:local
    pull: if-not-exists

steps:
  - name: build-local-images
    image: docker:27-cli
    environment:
      CHATOS_DOCKER_BUILD_PARALLEL_LIMIT: "1"
      CHATOS_DOCKER_MODE: build
      CHATOS_DOCKER_PRUNE_DANGLING_IMAGES: "true"
      CHATOS_IMAGE_NAMESPACE: ghcr.io/leeoohoo
      CHATOS_IMAGE_TAG: harness-ci
    commands:
      - apk add --no-cache bash docker-cli-compose
      - docker info
      - docker compose version
      - bash docker/deploy.sh build
      - docker images --format '{{.Repository}}:{{.Tag}} {{.Size}}' | grep 'chatos-rs-.*:harness-ci' | sort
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
