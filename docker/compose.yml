    image: ${MEMORY_ENGINE_FRONTEND_IMAGE:-${CHATOS_IMAGE_NAMESPACE:-ghcr.io/leeoohoo}/chatos-rs-memory-engine-frontend:${CHATOS_IMAGE_TAG:-latest}}
    environment:
      API_PROXY_PASS: http://user-service-backend:39190
      MEMORY_ENGINE_PROXY_PASS: http://memory-engine-backend:7081
      USER_SERVICE_PROXY_PASS: http://user-service-backend:39190
    ports:
      - "${MEMORY_ENGINE_FRONTEND_PORT:-4178}:80"
    depends_on:
      memory-engine-backend:
        condition: service_healthy
      user-service-backend:
        condition: service_healthy

  project-management-frontend:
