services:
  configuration-center-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: config_center_service_backend
        BIN_NAME: config_center_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  sandbox-agent-image:
    build:
      context: ..
      dockerfile: sandbox_manager_service/sandbox_agent/Dockerfile

  user-service-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: user_service/backend/Cargo.toml
        BIN_NAME: user_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  memory-engine-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: memory_engine/backend/Cargo.toml
        BIN_NAME: memory_engine
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  project-management-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: project_management_service_backend
        BIN_NAME: project_management_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  plugin-management-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: plugin_management_service_backend
        BIN_NAME: plugin_management_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  local-connector-service-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: local_connector_service_backend
        BIN_NAME: local_connector_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  sandbox-manager-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: sandbox_manager_service_backend
        BIN_NAME: sandbox_manager_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  task-runner-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: task_runner_service_backend
        BIN_NAME: task_runner_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  chatos-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: chat_app_server_rs
        BIN_NAME: chat_app_server_rs
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  official-website-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust-service
      args:
        MANIFEST_PATH: Cargo.toml
        PACKAGE_NAME: official_website_service_backend
        BIN_NAME: official_website_service_backend
        CARGO_TARGET_CACHE_ID: ${CHATOS_CARGO_TARGET_CACHE_ID:-chatos-rust-target-1.94-j4}

  chatos-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: chatos/frontend

  configuration-center-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: config_center_service/frontend

  user-service-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: user_service/frontend

  memory-engine-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: memory_engine/frontend
        VITE_MEMORY_ENGINE_API_BASE: /api/memory-engine/v1
        VITE_USER_SERVICE_API_BASE: /user-service

  project-management-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: project_management_service/frontend

  plugin-management-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: plugin_management_service/frontend

  task-runner-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: task_runner_service/frontend
        VITE_CONFIG_CENTER_URL: ${CONFIG_CENTER_PUBLIC_URL:-http://localhost:39271}

  sandbox-manager-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: sandbox_manager_service/frontend

  official-website-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: official_website_service/frontend
