version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/chat_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      chat-app-npm:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/chat_app_server_rs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      chat-app-server-rs-cargo:
        patterns:
          - "*"
