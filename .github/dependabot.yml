version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/chatos/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      chat-app-npm:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/chatos/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      chat-app-server-rs-cargo:
        patterns:
          - "*"
