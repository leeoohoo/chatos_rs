map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name jgoool.com www.jgoool.com;
    client_max_body_size 128m;

    include snippets/chatos-letsencrypt.conf;

    location / {
        include snippets/chatos-proxy-headers.conf;
        proxy_pass http://127.0.0.1:39251;
    }
}

